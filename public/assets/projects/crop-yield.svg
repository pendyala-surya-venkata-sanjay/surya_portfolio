    <path d="M860 320C860 290 885 270 915 270C945 270 970 290 970 320V410" stroke="#34D399" stroke-opacity="0.75" stroke-width="10" stroke-linecap="round"/>
    <circle cx="860" cy="320" r="8" fill="#38BDF8"/>
    <circle cx="970" cy="320" r="8" fill="#34D399"/>
  </g>
</svg>

