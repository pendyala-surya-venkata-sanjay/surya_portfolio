      <stop offset="0" stop-color="#0B1224"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#16A34A" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#sky)"/>

  <g opacity="0.6" filter="url(#glow)">
    <circle cx="900" cy="160" r="140" fill="#34D399" fill-opacity="0.18"/>
    <circle cx="320" cy="220" r="110" fill="#38BDF8" fill-opacity="0.12"/>
  </g>

